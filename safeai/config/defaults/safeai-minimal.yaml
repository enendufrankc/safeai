# SafeAI minimal configuration.
# This is the simplest setup — just policy paths and audit logging.
# Run 'safeai init --full' to add contracts, memory, agents, plugins, and more.
version: v1alpha1

# ── File paths ──────────────────────────────────────────────────────
paths:
  # Policy rules that control allow/block/redact decisions.
  policy_files:
    - policies/default.yaml

# ── Audit logging ───────────────────────────────────────────────────
# Every policy decision is logged here as a JSON-lines file.
audit:
  file_path: logs/audit.log
